name: Rosewood

options:
  bundleIdPrefix: com.rosewood
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_ENTITLEMENTS: ""
    PRODUCT_NAME: Rosewood
    MARKETING_VERSION: "0.1.0"

packages:
  Highlightr:
    url: https://github.com/raspu/Highlightr
    exactVersion: 2.2.1
  TOMLKit:
    url: https://github.com/LebJe/TOMLKit
    from: "0.6.0"

targets:
  Rosewood:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources
        type: group
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: Rosewood
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2024 Rosewood. All rights reserved."
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: Highlightr
      - package: TOMLKit
    entitlements:
      path: Resources/Rosewood.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true

  RosewoodTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_NAME: RosewoodTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Rosewood

  RosewoodUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
    settings:
      base:
        PRODUCT_NAME: RosewoodUITests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Rosewood
